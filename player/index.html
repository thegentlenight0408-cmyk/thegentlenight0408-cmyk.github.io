<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a14">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Nyxa Player · Suno Library</title>
<link rel="stylesheet" href="styles.css?v=13">
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header class="topbar">
    <div class="brand">
      <span class="logo">◐</span>
      <span class="title">Nyxa Player</span>
      <span class="subtitle">Suno Library</span>
      <span class="build-tag" id="build-tag" title="目前載入的版本 — 重新整理後若沒變即代表快取卡住">v2026-06-17</span>
    </div>
    <div class="topbar-actions">
      <button id="btn-add-song" class="ghost" title="新增歌曲（從本機選擇 mp3）">＋ 加曲</button>
      <button id="btn-reset" class="ghost" title="還原原始 BPM">↺ 重置 BPM</button>
    </div>
  </header>

  <!-- NOW PLAYING -->
  <section class="now-playing">
    <div class="np-meta">
      <div class="np-title" id="np-title">尚未選曲</div>
      <div class="np-tags" id="np-tags"></div>
    </div>
    <div class="np-progress">
      <span class="t-current" id="t-current">0:00</span>
      <input type="range" id="seek-slider" class="seek-slider" min="0" max="1000" value="0" step="1">
      <span class="t-total" id="t-total">0:00</span>
    </div>
    <div class="np-bpm-row">
      <div class="bpm-info">
        <span>原始 BPM</span>
        <strong id="bpm-original">—</strong>
      </div>
      <div class="bpm-info">
        <span>目前播放</span>
        <strong id="bpm-current">—</strong>
        <em id="rate-current"></em>
      </div>
    </div>
    <div class="transport">
      <button id="btn-prev" class="circle" title="上一首">⏮</button>
      <button id="btn-back10" class="circle" title="後退 10 秒">−10</button>
      <button id="btn-play" class="circle big">▶</button>
      <button id="btn-fwd10" class="circle" title="前進 10 秒">+10</button>
      <button id="btn-next" class="circle" title="下一首">⏭</button>
    </div>
    <div class="transport mode-row">
      <button id="btn-loop-one" class="circle mode" data-mode="loop-one" title="單曲循環">🔂</button>
      <button id="btn-loop-all" class="circle mode active" data-mode="loop-all" title="歌單循環">🔁</button>
      <button id="btn-shuffle" class="circle mode" data-mode="shuffle" title="隨機循環">🔀</button>
    </div>
  </section>

  <!-- BPM CONTROL -->
  <section class="bpm-control">
    <div class="bpm-control-row">
      <label>目標 BPM</label>
      <input id="target-bpm" type="number" min="40" max="300" value="180" step="1">
      <button id="btn-apply-current" class="primary">套用本曲</button>
      <button id="btn-apply-all" class="primary alt">全部套用</button>
      <button id="btn-metronome" class="primary metronome" title="以目前 BPM 啟動節拍器">🥁 節拍器</button>
      <button id="btn-tap" class="primary tap" title="跟著歌曲節奏連點，自動算 BPM">👆 TAP</button>
      <span id="tap-readout" class="tap-readout"></span>
    </div>
    <div class="bpm-presets">
      <span class="hint">快速：</span>
      <button class="chip" data-bpm="126">126</button>
      <button class="chip" data-bpm="138">138</button>
      <button class="chip" data-bpm="150">150</button>
      <button class="chip" data-bpm="160">160</button>
      <button class="chip" data-bpm="170">170</button>
      <button class="chip" data-bpm="180">180</button>
      <button class="chip" data-bpm="190">190</button>
      <button class="chip" data-bpm="200">200</button>
    </div>
  </section>

  <!-- PLAYLIST TABS -->
  <section class="playlist-section">
    <div class="playlist-tabs" id="playlist-tabs">
      <!-- 由 JS 動態填入 -->
    </div>
    <div class="playlist-header">
      <h2 id="playlist-name">歌單</h2>
      <div class="playlist-actions">
        <button id="btn-restore" class="ghost" title="把所有從歌單移除的歌加回來">↻ 還原全部</button>
        <button id="btn-sort-order" class="ghost" title="依原始順序排序">↕ 原始</button>
        <button id="btn-sort-bpm" class="ghost" title="依 BPM 排序">↕ BPM</button>
        <button id="btn-sort-shuffle" class="ghost" title="隨機打亂順序">🔀 隨機</button>
        <button id="btn-clear" class="ghost danger" title="從當前歌單清空（檔案還在）">清空</button>
      </div>
    </div>
    <ul id="playlist" class="playlist"></ul>
  </section>

  <input type="file" id="file-input" accept="audio/*" multiple hidden>

  <audio id="audio" preload="metadata"></audio>
</div>

<script src="app.js?v=13"></script>
</body>
</html>
